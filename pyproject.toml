[project]
name = "jolmind"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "black>=26.3.0",
    "pylint>=4.0.5",
]

[tool.black]
line-length = 88
target-version = ['py314']
include = '\.pyi?$'

[tool.pylint.messages_control]
max-line-length = 88
disable = [
    "C0111",  # missing-docstring
]

[tool.pylint.format]
max-line-length = 88

[[tool.uv.index]]
url = "https://pypi.tuna.tsinghua.edu.cn/simple"
default = true

[dependency-groups]
dev = [
    "black>=26.3.0",
    "pre-commit>=4.5.1",
    "pylint>=4.0.5",
]
